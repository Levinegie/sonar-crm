<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>声纳 AI · 老板看板</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@600;700&display=swap" rel="stylesheet">
<style>
:root {
  --navy:#0d1f3c; --blue:#1a56db; --blue-light:#3b82f6; --blue-pale:#eff6ff;
  --cyan:#0ea5e9; --green:#10b981; --green-pale:#f0fdf4; --amber:#f59e0b;
  --amber-pale:#fffbeb; --red:#ef4444; --red-pale:#fef2f2; --purple:#8b5cf6;
  --purple-pale:#f5f3ff; --gray-50:#f8fafc; --gray-100:#f1f5f9; --gray-200:#e2e8f0;
  --gray-300:#cbd5e1; --gray-400:#94a3b8; --gray-500:#64748b; --gray-600:#475569;
  --gray-700:#334155; --gray-800:#1e293b; --text:#0f172a; --white:#fff; --sidebar:220px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans SC',sans-serif;background:var(--gray-50);color:var(--text);min-height:100vh;}
.topbar{position:fixed;top:0;left:0;right:0;z-index:1000;background:var(--navy);display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:48px;}
.topbar .logo{font-family:'Noto Serif SC',serif;font-size:16px;font-weight:700;color:white;letter-spacing:2px;}
.app{display:flex;padding-top:48px;min-height:100vh;}
.sidebar{width:var(--sidebar);position:fixed;top:48px;left:0;bottom:0;background:var(--white);border-right:1px solid var(--gray-200);display:flex;flex-direction:column;overflow-y:auto;z-index:100;}
.sidebar-profile{padding:20px 16px;border-bottom:1px solid var(--gray-100);display:flex;align-items:center;gap:10px;}
.avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:white;flex-shrink:0;}
.profile-info .name{font-size:14px;font-weight:600;color:var(--gray-800);}
.profile-info .role-label{font-size:11px;color:var(--gray-400);margin-top:1px;}
.nav-group{padding:8px 0;}
.nav-group-label{font-size:10px;font-weight:700;color:var(--gray-400);letter-spacing:1.5px;text-transform:uppercase;padding:8px 16px 4px;}
.nav-link{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;color:var(--gray-500);font-size:13px;font-weight:400;transition:all 0.15s;border-left:3px solid transparent;}
.nav-link:hover{color:var(--gray-800);background:var(--gray-50);}
.nav-link.active{color:var(--blue);background:var(--blue-pale);border-left-color:var(--blue);font-weight:500;}
.nav-link .ni{font-size:15px;width:18px;text-align:center;}
.nav-badge{margin-left:auto;background:var(--red);color:white;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;}
.main{margin-left:var(--sidebar);flex:1;min-height:calc(100vh - 48px);}
.view{display:none;}.view.active{display:block;}
.page-header{background:var(--white);border-bottom:1px solid var(--gray-200);padding:20px 28px;display:flex;align-items:center;justify-content:space-between;}
.page-title{font-size:18px;font-weight:700;color:var(--navy);}
.page-sub{font-size:12px;color:var(--gray-400);margin-top:2px;}
.page-body{padding:24px 28px;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all 0.15s;font-family:'Noto Sans SC',sans-serif;}
.btn-primary{background:var(--blue);color:white;}.btn-primary:hover{background:#1d4ed8;}
.btn-outline{background:transparent;color:var(--gray-600);border:1px solid var(--gray-200);}.btn-outline:hover{background:var(--gray-50);}
.btn-sm{padding:5px 10px;font-size:12px;}
.btn-green{background:var(--green);color:white;}
.btn-red{background:var(--red);color:white;}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px;}
.stat-card{background:var(--white);border:1px solid var(--gray-200);border-radius:12px;padding:20px;position:relative;overflow:hidden;}
.stat-card .stat-label{font-size:12px;color:var(--gray-400);margin-bottom:8px;font-weight:500;}
.stat-card .stat-val{font-size:28px;font-weight:700;color:var(--navy);font-family:'Noto Serif SC',serif;}
.stat-card .stat-sub{font-size:11px;color:var(--gray-400);margin-top:4px;}
.stat-card .stat-icon{position:absolute;right:16px;top:16px;font-size:24px;opacity:0.15;}
.chart-card{background:var(--white);border:1px solid var(--gray-200);border-radius:12px;padding:20px;margin-bottom:20px;}
.chart-title{font-size:14px;font-weight:700;color:var(--navy);margin-bottom:16px;}
.boss-grid{display:grid;grid-template-columns:2fr 1fr;gap:20px;}
.funnel{display:flex;flex-direction:column;gap:8px;}
.funnel-row{display:flex;align-items:center;gap:12px;}
.funnel-label{font-size:12px;color:var(--gray-500);width:70px;flex-shrink:0;}
.funnel-bar-wrap{flex:1;background:var(--gray-100);border-radius:4px;height:26px;overflow:hidden;}
.funnel-bar{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:10px;gap:8px;}
.funnel-bar span{font-size:11px;font-weight:700;color:white;}
.funnel-bar .rate{font-size:10px;color:rgba(255,255,255,0.7);}
.funnel-count{font-size:12px;color:var(--gray-500);width:30px;text-align:right;flex-shrink:0;}
.agent-list{display:flex;flex-direction:column;gap:10px;}
.agent-item{display:flex;align-items:center;gap:10px;padding:12px;background:var(--gray-50);border-radius:10px;}
.warn-list{display:flex;flex-direction:column;gap:8px;}
.warn-item{padding:12px 14px;border-radius:10px;border-left:4px solid;}
.warn-item.red{background:var(--red-pale);border-color:var(--red);}
.warn-item.amber{background:var(--amber-pale);border-color:var(--amber);}
.warn-item .wname{font-size:13px;font-weight:600;color:var(--gray-800);}
.warn-item .wmeta{font-size:11px;color:var(--gray-500);margin-top:3px;}
table{width:100%;border-collapse:collapse;}
th{padding:10px 16px;text-align:left;font-size:11px;font-weight:700;color:var(--gray-400);letter-spacing:0.5px;background:var(--gray-50);border-bottom:1px solid var(--gray-200);white-space:nowrap;}
td{padding:12px 16px;font-size:13px;color:var(--gray-700);border-bottom:1px solid var(--gray-100);}
tr:last-child td{border-bottom:none;}
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;}
.badge-s{background:#fef2f2;color:#dc2626;}.badge-a{background:#fffbeb;color:#d97706;}.badge-b{background:#f0fdf4;color:#16a34a;}.badge-c{background:var(--gray-100);color:var(--gray-500);}
.badge-pending{background:#fefce8;color:#ca8a04;}.badge-valid{background:#f0fdf4;color:#16a34a;}.badge-invited{background:#fdf4ff;color:#9333ea;}.badge-visited{background:#fff7ed;color:#ea580c;}.badge-signed{background:#dcfce7;color:#15803d;}.badge-dead{background:var(--gray-100);color:var(--gray-400);}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:9999;display:none;align-items:center;justify-content:center;}
.modal-overlay.show{display:flex;}
.modal{background:white;border-radius:12px;padding:28px;width:420px;max-width:90%;max-height:80vh;overflow-y:auto;}
.modal h3{font-size:16px;font-weight:700;margin-bottom:16px;color:var(--navy);}
.form-group{margin-bottom:14px;}
.form-group label{display:block;font-size:12px;font-weight:600;color:var(--gray-600);margin-bottom:4px;}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:8px 12px;border:1px solid var(--gray-200);border-radius:8px;font-size:13px;font-family:'Noto Sans SC',sans-serif;outline:none;}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--blue);}
/* end */
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">声纳 <span style="font-weight:400;opacity:0.6">· 老板看板</span></div>
  <div style="display:flex;align-items:center;gap:16px;">
    <div style="color:rgba(255,255,255,0.6);font-size:12px" id="user-info" style="display:none">
      <span id="current-user">老板</span> · <span onclick="doLogout()" style="cursor:pointer;opacity:0.7">退出</span>
    </div>
    <div id="login-btn" style="color:rgba(255,255,255,0.6);font-size:12px">
      <span onclick="showLogin()" style="cursor:pointer;opacity:0.7">登录</span>
    </div>
    <div style="color:rgba(255,255,255,0.3);font-size:10px;">v2.1</div>
  </div>
</div>

<!-- 登录弹窗 -->
<div class="modal-overlay" id="login-modal">
  <div class="modal" style="width:360px">
    <h3 style="text-align:center">老板登录</h3>
    <div class="form-group"><input id="login-username" placeholder="用户名"></div>
    <div class="form-group"><input id="login-password" type="password" placeholder="密码"></div>
    <button class="btn btn-primary" style="width:100%" onclick="handleLogin()">登录</button>
    <div onclick="document.getElementById('login-modal').classList.remove('show')" style="text-align:center;margin-top:12px;color:var(--gray-500);font-size:13px;cursor:pointer">取消</div>
  </div>
</div>

<div class="app">
  <nav class="sidebar">
    <div class="sidebar-profile" id="sidebar-profile">
      <div class="avatar" style="background:var(--navy)">老</div>
      <div class="profile-info"><div class="name" id="profile-name">老板</div><div class="role-label">管理看板</div></div>
    </div>
    <div class="nav-group">
      <div class="nav-group-label">看板</div>
      <a class="nav-link active" onclick="showView('dashboard',this)"><span class="ni">📊</span>今日概览</a>
      <a class="nav-link" onclick="showView('agents',this)"><span class="ni">👤</span>客服表现</a>
      <a class="nav-link" onclick="showView('roi',this)"><span class="ni">💰</span>渠道 ROI</a>
    </div>
    <div class="nav-group">
      <div class="nav-group-label">管理</div>
      <a class="nav-link" onclick="showView('allcust',this)"><span class="ni">👥</span>全部客户</a>
      <a class="nav-link" onclick="showView('violations',this)"><span class="ni">⚠️</span>违禁词预警</a>
      <a class="nav-link" onclick="showView('settings',this)"><span class="ni">⚙️</span>规则设置</a>
      <a class="nav-link" onclick="showView('leave',this)"><span class="ni">📅</span>请假管理<span class="nav-badge" id="leave-badge" style="display:none">0</span></a>
    </div>
    <div class="nav-group">
      <div class="nav-group-label">AI 报告</div>
      <a class="nav-link" onclick="showView('report',this)"><span class="ni">📑</span>经营报告</a>
    </div>
  </nav>

  <main class="main">
    <!-- 今日概览 -->
    <div class="view active" id="view-dashboard">
      <div class="page-header"><div><div class="page-title">今日概览</div><div class="page-sub" id="dashboard-date"></div></div></div>
      <div class="page-body">
        <div class="stats-grid" id="dashboard-stats"></div>
        <div class="boss-grid">
          <div>
            <div class="chart-card"><div class="chart-title">本月转化漏斗</div><div class="funnel" id="funnel-body"></div></div>
            <div class="chart-card"><div class="chart-title">超期未跟进预警</div><div class="warn-list" id="warn-list"></div></div>
          </div>
          <div>
            <div class="chart-card"><div class="chart-title">客服今日完成情况</div><div class="agent-list" id="agent-rank"></div></div>
          </div>
        </div>
      </div>
    </div>

    <!-- 客服表现 -->
    <div class="view" id="view-agents">
      <div class="page-header"><div class="page-title">客服表现分析</div></div>
      <div class="page-body" id="agents-body"></div>
    </div>

    <!-- 渠道ROI -->
    <div class="view" id="view-roi">
      <div class="page-header"><div><div class="page-title">渠道 ROI 分析</div></div><button class="btn btn-primary btn-sm" onclick="showSpendModal()">录入消费数据</button></div>
      <div class="page-body">
        <div class="stats-grid" style="grid-template-columns:repeat(3,1fr)" id="roi-stats"></div>
        <div class="chart-card"><div class="chart-title">各渠道详细数据</div>
          <table><thead><tr><th>渠道</th><th>消费</th><th>获客量</th><th>获客成本</th><th>有效量</th><th>到店量</th><th>成单数</th><th>成单率</th><th>业绩</th></tr></thead>
          <tbody id="roi-table"></tbody></table>
        </div>
      </div>
    </div>

    <!-- 全部客户 -->
    <div class="view" id="view-allcust">
      <div class="page-header"><div><div class="page-title">全部客户</div><div class="page-sub" id="cust-count"></div></div></div>
      <div class="page-body">
        <div style="background:white;border:1px solid var(--gray-200);border-radius:12px;padding:16px 20px;margin-bottom:16px">
          <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
            <div style="display:flex;align-items:center;gap:8px;background:var(--gray-50);border:1px solid var(--gray-200);border-radius:8px;padding:6px 12px;max-width:220px"><span>🔍</span><input type="text" id="cust-search" placeholder="姓名/电话/小区…" oninput="renderCustomers()" style="border:none;background:transparent;font-size:13px;outline:none;width:100%;font-family:'Noto Sans SC',sans-serif"></div>
            <select id="cust-agent" onchange="renderCustomers()" style="padding:6px 10px;border:1px solid var(--gray-200);border-radius:8px;font-size:12px;font-family:'Noto Sans SC',sans-serif"><option value="">全部客服</option></select>
            <select id="cust-status" onchange="renderCustomers()" style="padding:6px 10px;border:1px solid var(--gray-200);border-radius:8px;font-size:12px;font-family:'Noto Sans SC',sans-serif"><option value="">全部状态</option><option value="pending">待确认</option><option value="valid">有效客户</option><option value="invited">已邀约</option><option value="visited">已到店</option><option value="signed">已签单</option><option value="dead">死单</option></select>
            <select id="cust-level" onchange="renderCustomers()" style="padding:6px 10px;border:1px solid var(--gray-200);border-radius:8px;font-size:12px;font-family:'Noto Sans SC',sans-serif"><option value="">全部级别</option><option value="S">S级</option><option value="A">A级</option><option value="B">B级</option><option value="C">C级</option></select>
          </div>
        </div>
        <div style="background:white;border:1px solid var(--gray-200);border-radius:12px;overflow:hidden">
          <table><thead><tr><th>客户</th><th>归属客服</th><th>小区</th><th>级别</th><th>状态</th><th>通话数</th><th>最近跟进</th></tr></thead>
          <tbody id="cust-table"></tbody></table>
        </div>
      </div>
    </div>

    <!-- 违禁词预警 -->
    <div class="view" id="view-violations">
      <div class="page-header"><div class="page-title">违禁词预警</div></div>
      <div class="page-body" id="violations-body"></div>
    </div>

    <!-- 规则设置 -->
    <div class="view" id="view-settings">
      <div class="page-header"><div class="page-title">规则设置</div></div>
      <div class="page-body"><div style="max-width:600px" id="settings-body"></div></div>
    </div>

    <!-- 请假管理 -->
    <div class="view" id="view-leave">
      <div class="page-header"><div class="page-title">请假管理</div></div>
      <div class="page-body" id="leave-body"></div>
    </div>

    <!-- 经营报告 -->
    <div class="view" id="view-report">
      <div class="page-header"><div><div class="page-title">经营报告</div><div class="page-sub">每月自动生成</div></div></div>
      <div class="page-body" style="max-width:900px" id="report-body"></div>
    </div>
  </main>
</div>

<!-- 消费录入弹窗 -->
<div class="modal-overlay" id="spend-modal">
  <div class="modal">
    <h3>录入渠道消费</h3>
    <div class="form-group"><label>渠道</label><select id="spend-channel"><option>抖音-装修主号</option><option>抖音-设计号</option><option>直播间留资</option><option>老客户转介绍</option></select></div>
    <div class="form-group"><label>月份</label><input type="month" id="spend-month"></div>
    <div class="form-group"><label>消费金额（元）</label><input type="number" id="spend-amount" placeholder="例如 12000"></div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn btn-outline" onclick="document.getElementById('spend-modal').classList.remove('show')">取消</button>
      <button class="btn btn-primary" onclick="saveSpend()">保存</button>
    </div>
  </div>
</div>

<script>
const API_BASE = window.location.origin;
let token = localStorage.getItem('sonar_token');
let currentUser = null;
let customers = [];
let agentList = [];
let settings = {};
const statusMap = {pending:['待确认','badge-pending'],valid:['有效客户','badge-valid'],invited:['已邀约','badge-invited'],visited:['已到店','badge-visited'],signed:['已签单','badge-signed'],dead:['死单','badge-dead']};
const levelMap = {S:'badge-s',A:'badge-a',B:'badge-b',C:'badge-c'};

async function api(path, opts = {}) {
  const res = await fetch(API_BASE + path, { ...opts, headers: { 'Content-Type':'application/json', 'Authorization': token ? `Bearer ${token}` : '', ...opts.headers } });
  return res.json();
}

// 登录
function showLogin() { document.getElementById('login-modal').classList.add('show'); }
async function handleLogin() {
  const u = document.getElementById('login-username').value.trim();
  const p = document.getElementById('login-password').value;
  if (!u || !p) return alert('请输入用户名和密码');
  const d = await api('/api/auth/login', { method:'POST', body: JSON.stringify({username:u,password:p}) });
  if (d.success && d.data?.token) {
    token = d.data.token; localStorage.setItem('sonar_token', token); currentUser = d.data.user;
    document.getElementById('login-modal').classList.remove('show');
    afterLogin();
  } else { alert(d.error || '登录失败'); }
}
function doLogout() { localStorage.removeItem('sonar_token'); token = null; currentUser = null; location.reload(); }

function afterLogin() {
  document.getElementById('login-btn').style.display = 'none';
  document.getElementById('user-info').style.display = 'block';
  document.getElementById('current-user').textContent = currentUser?.name || '老板';
  const p = document.getElementById('sidebar-profile');
  if (currentUser) {
    p.querySelector('.name').textContent = currentUser.name;
    p.querySelector('.avatar').textContent = currentUser.name[0];
  }
  loadAll();
}

async function checkAuth() {
  if (!token) return false;
  try { const d = await api('/api/auth/me'); if (d.success) { currentUser = d.data; return true; } } catch(e) {}
  return false;
}

// 视图切换
function showView(id, el) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
  const t = document.getElementById('view-' + id);
  if (t) t.classList.add('active');
  if (el) el.classList.add('active');
}

// 加载所有数据
async function loadAll() {
  await Promise.all([loadDashboard(), loadCustomers(), loadAgents(), loadSettings(), loadLeaveRequests()]);
  renderDashboard();
  renderAgentPerformance();
  renderROI();
  renderCustomers();
  renderViolations();
  renderSettings();
  renderReport();
}

// ══ 今日概览 ══
let dashData = null;
async function loadDashboard() {
  try { const d = await api('/api/stats/dashboard'); if (d.success) dashData = d.data; } catch(e) {}
}

function renderDashboard() {
  const now = new Date();
  document.getElementById('dashboard-date').textContent = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 · 数据实时更新`;

  const d = dashData || {};
  const agentCount = d.agentStats?.length || agentList.length || 0;
  const perTarget = parseInt(settings.per_person_target || '100');
  const teamTarget = agentCount * perTarget;
  const calls = d.todayCalls || 0;
  const pct = teamTarget > 0 ? Math.round(calls / teamTarget * 100) : 0;

  document.getElementById('dashboard-stats').innerHTML = `
    <div class="stat-card"><div class="stat-label">今日团队通话</div><div class="stat-val">${calls}</div><div class="stat-sub">目标 ${teamTarget} 通（${agentCount}人×${perTarget}）· 完成 ${pct}%</div><div class="stat-icon">📞</div></div>
    <div class="stat-card"><div class="stat-label">今日新增线索</div><div class="stat-val">${d.funnel?.pending || 0}</div><div class="stat-sub">待确认客户</div><div class="stat-icon">✨</div></div>
    <div class="stat-card"><div class="stat-label">有效客户</div><div class="stat-val">${d.validCustomers || 0}</div><div class="stat-sub">总客户 ${d.totalCustomers || 0}</div><div class="stat-icon">👥</div></div>
    <div class="stat-card"><div class="stat-label">已签单</div><div class="stat-val">${d.signedCustomers || 0}</div><div class="stat-sub">公海 ${d.inSeaCount || 0} 位</div><div class="stat-icon">🎉</div></div>`;

  // 漏斗
  const f = d.funnel || {total:0,pending:0,valid:0,invited:0,visited:0,signed:0};
  const total = f.total || 1;
  const colors = ['#3b82f6','#06b6d4','#8b5cf6','#f59e0b','#10b981'];

    ['已到店', f.visited + f.signed, '到店率'],
    ['已签单', f.signed, '成单率'],

      <div class="avatar" style="background:${agentColors[i%5]};width:32px;height:32px;font-size:12px">${(a.name||'?')[0]}</div>

    </div>`).join('');

  document.getElementById('warn-list').innerHTML = `
    <div style="text-align:center;padding:16px;color:var(--gray-400);font-size:13px">暂无超期预警</div>`;

// ══ 渠道 ROI ══
const roiMock = [
  {ch:'抖音-装修主号',spend:12000,leads:28,valid:20,toStore:9,signed:2,perf:328000},
  {ch:'抖音-设计号',spend:8000,leads:18,valid:13,toStore:5,signed:1,perf:168000},
  {ch:'直播间留资',spend:6000,leads:12,valid:8,toStore:3,signed:0,perf:0},
  {ch:'老客户转介绍',spend:0,leads:10,valid:4,toStore:2,signed:0,perf:0},
];

function renderROI() {
  const totalSpend = roiMock.reduce((s,r) => s + r.spend, 0);
  const totalLeads = roiMock.reduce((s,r) => s + r.leads, 0);
  const totalSigned = roiMock.reduce((s,r) => s + r.signed, 0);
  const avgCost = totalLeads > 0 ? Math.round(totalSpend / totalLeads) : 0;
  const signCost = totalSigned > 0 ? (totalSpend / totalSigned / 10000).toFixed(2) : '—';

  document.getElementById('roi-stats').innerHTML = `
    <div class="stat-card"><div class="stat-label">本月总投流</div><div class="stat-val">${(totalSpend/10000).toFixed(1)}<span style="font-size:16px">万</span></div></div>
    <div class="stat-card"><div class="stat-label">平均获客成本</div><div class="stat-val">${avgCost}<span style="font-size:16px">元</span></div><div class="stat-sub">每条线索</div></div>
    <div class="stat-card"><div class="stat-label">平均成单成本</div><div class="stat-val">${signCost}<span style="font-size:16px">万</span></div><div class="stat-sub">每单</div></div>`;

  document.getElementById('roi-table').innerHTML = roiMock.map(r => {
    const gc = r.spend > 0 && r.leads > 0 ? Math.round(r.spend/r.leads)+'元' : '—';
    const vc = r.spend > 0 && r.valid > 0 ? Math.round(r.spend/r.valid)+'元' : '—';
    const sr = r.leads > 0 ? Math.round(r.signed/r.leads*100)+'%' : '0%';
    return `<tr><td><strong>${r.ch}</strong></td><td>${r.spend>0?(r.spend/10000).toFixed(1)+'万':'0'}</td><td>${r.leads}</td><td>${gc}</td><td>${r.valid}</td><td>${r.toStore}</td><td>${r.signed}</td><td>${sr}</td><td>${r.perf>0?(r.perf/10000).toFixed(1)+'万':'0'}</td></tr>`;
  }).join('');
}

function renderCustomers() {

            ` : '—'}</td>

async function reviewLeave(id, status) {
  // mock 模式
  if (id.startsWith('mock-')) {
    const item = leaveList.find(l => l.id === id);
    if (item) { item.status = status; item.reviewedAt = new Date().toISOString(); }
    renderLeave();
    return;
  }
  const d = await api('/api/stats/leave-requests/' + id, { method:'PUT', body: JSON.stringify({status}) });
  if (d.success) { await loadLeaveRequests(); } else { alert(d.error || '操作失败'); }
}
