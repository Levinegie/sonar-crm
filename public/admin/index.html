<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>声纳 CRM - 平台管理</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@600;700&display=swap" rel="stylesheet">
<style>
:root {
  --navy:#0d1f3c; --blue:#1a56db; --blue-light:#3b82f6; --blue-pale:#eff6ff;
  --cyan:#0ea5e9; --green:#10b981; --green-pale:#f0fdf4; --amber:#f59e0b;
  --amber-pale:#fffbeb; --red:#ef4444; --red-pale:#fef2f2; --purple:#8b5cf6;
  --purple-pale:#f5f3ff; --gray-50:#f8fafc; --gray-100:#f1f5f9; --gray-200:#e2e8f0;
  --gray-300:#cbd5e1; --gray-400:#94a3b8; --gray-500:#64748b; --gray-600:#475569;
  --gray-700:#334155; --gray-800:#1e293b; --text:#0f172a; --white:#fff; --sidebar:220px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans SC',sans-serif;background:var(--gray-50);color:var(--text);min-height:100vh;}

/* 登录页 */
.login-page{height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--navy),#1e3a5f);}
.login-card{background:white;border-radius:16px;padding:40px;width:400px;box-shadow:0 20px 60px rgba(0,0,0,0.3);}
.login-logo{font-family:'Noto Serif SC',serif;font-size:28px;font-weight:700;color:var(--navy);text-align:center;margin-bottom:8px;letter-spacing:4px}
.login-logo span{color:var(--blue)}
.login-sub{text-align:center;color:var(--gray-400);font-size:13px;margin-bottom:32px}
.form-group{margin-bottom:20px}
.form-group label{display:block;font-size:13px;font-weight:500;color:var(--gray-600);margin-bottom:6px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:12px 14px;border:1px solid var(--gray-200);border-radius:8px;font-size:14px;outline:none;transition:border-color 0.2s;font-family:inherit}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--blue)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:12px 20px;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;border:none;transition:all 0.15s;font-family:inherit}
.btn-primary{background:var(--blue);color:white}
.btn-primary:hover{background:#1d4ed8}
.btn-outline{background:transparent;color:var(--gray-600);border:1px solid var(--gray-200)}
.btn-outline:hover{background:var(--gray-50)}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-xs{padding:4px 8px;font-size:11px}
.btn-green{background:var(--green);color:white}
.btn-red{background:var(--red);color:white}
.btn-amber{background:var(--amber);color:white}
.btn-full{width:100%}

/* 后台布局 */
.app{display:none;min-height:100vh}
.app.active{display:flex}
.topbar{position:fixed;top:0;left:0;right:0;height:56px;background:var(--navy);display:flex;align-items:center;justify-content:space-between;padding:0 24px;z-index:1000}
.topbar-logo{font-family:'Noto Serif SC',serif;font-size:18px;font-weight:700;color:white;letter-spacing:2px}
.topbar-logo span{color:var(--blue-light)}
.topbar-user{display:flex;align-items:center;gap:12px;color:white;font-size:14px}
.topbar-user .avatar{width:32px;height:32px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;font-weight:600}
.topbar-user .name{font-weight:500}
.topbar-user .role{font-size:12px;opacity:0.6;cursor:pointer}
.sidebar{width:var(--sidebar);position:fixed;top:56px;left:0;bottom:0;background:white;border-right:1px solid var(--gray-200);overflow-y:auto}
.nav-group{padding:12px 0}
.nav-group-label{font-size:10px;font-weight:700;color:var(--gray-400);letter-spacing:1.5px;text-transform:uppercase;padding:8px 20px 4px}
.nav-link{display:flex;align-items:center;gap:10px;padding:10px 20px;cursor:pointer;color:var(--gray-500);font-size:13px;font-weight:400;transition:all 0.15s;border-left:3px solid transparent}
.nav-link:hover{color:var(--gray-800);background:var(--gray-50)}
.nav-link.active{color:var(--blue);background:var(--blue-pale);border-left-color:var(--blue);font-weight:500}
.main{margin-left:var(--sidebar);margin-top:56px;padding:24px;min-height:calc(100vh - 56px);width:calc(100% - var(--sidebar))}

/* 页面标题 */
.page-header{background:white;border:1px solid var(--gray-200);border-radius:12px;padding:20px 24px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between}
.page-title{font-size:18px;font-weight:700;color:var(--navy)}
.page-sub{font-size:12px;color:var(--gray-400);margin-top:2px}

/* 统计卡片 */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.stat-card{background:white;border:1px solid var(--gray-200);border-radius:12px;padding:20px;position:relative;overflow:hidden}
.stat-card .stat-label{font-size:12px;color:var(--gray-400);margin-bottom:8px;font-weight:500}
.stat-card .stat-val{font-size:28px;font-weight:700;color:var(--navy);font-family:'Noto Serif SC',serif}
.stat-card .stat-sub{font-size:11px;color:var(--gray-400);margin-top:4px}
.stat-card .stat-icon{position:absolute;right:16px;top:16px;font-size:28px;opacity:0.15}

/* 表格 */
.table-card{background:white;border:1px solid var(--gray-200);border-radius:12px;overflow:hidden}
.table-toolbar{padding:14px 20px;border-bottom:1px solid var(--gray-100);display:flex;align-items:center;gap:12px}
.search-box{display:flex;align-items:center;gap:8px;background:var(--gray-50);border:1px solid var(--gray-200);border-radius:8px;padding:6px 12px;flex:1;max-width:280px}
.search-box input{border:none;background:transparent;font-size:13px;color:var(--gray-700);outline:none;width:100%}
table{width:100%;border-collapse:collapse}
th{padding:12px 16px;text-align:left;font-size:11px;font-weight:700;color:var(--gray-400);letter-spacing:0.5px;text-transform:uppercase;background:var(--gray-50);border-bottom:1px solid var(--gray-200);white-space:nowrap}
td{padding:12px 16px;font-size:13px;color:var(--gray-700);border-bottom:1px solid var(--gray-100)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--gray-50)}

/* 标签 */
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.badge-active{background:var(--green-pale);color:#16a34a}
.badge-disabled{background:var(--gray-100);color:var(--gray-400)}
.badge-expiring{background:var(--amber-pale);color:#d97706}

/* 弹窗 */
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;z-index:2000}
.modal.active{display:flex}
.modal-content{background:white;border-radius:12px;padding:24px;width:90%;max-width:600px;max-height:90vh;overflow-y:auto}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.modal-title{font-size:16px;font-weight:700;color:var(--navy)}
.modal-close{font-size:20px;color:var(--gray-400);cursor:pointer}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}

/* 配置卡片 */
.config-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px;margin-top:16px}
.config-card{background:white;border:1px solid var(--gray-200);border-radius:12px;padding:20px}
.config-card-title{font-size:14px;font-weight:700;color:var(--navy);margin-bottom:4px}
.config-card-desc{font-size:12px;color:var(--gray-400);margin-bottom:12px}
.config-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--gray-100)}
.config-row:last-child{border-bottom:none}
.config-label{font-size:12px;color:var(--gray-500)}
.config-value{font-size:12px;color:var(--gray-700);font-weight:500}
.prompt-preview{font-size:12px;color:var(--gray-500);margin-top:8px;padding:8px;background:var(--gray-50);border-radius:6px;max-height:60px;overflow:hidden;white-space:pre-wrap;word-break:break-all}

/* 测试窗口 */
.test-panel{background:white;border:1px solid var(--gray-200);border-radius:12px;padding:20px;margin-top:20px}
.test-panel h3{font-size:14px;font-weight:700;color:var(--navy);margin-bottom:16px}
.test-output{background:var(--gray-50);border:1px solid var(--gray-200);border-radius:8px;padding:16px;min-height:120px;max-height:300px;overflow-y:auto;font-size:13px;color:var(--gray-700);white-space:pre-wrap;word-break:break-all;margin-top:12px}

/* 开关 */
.toggle{position:relative;width:44px;height:24px;background:var(--gray-200);border-radius:12px;cursor:pointer;transition:background 0.2s;display:inline-block}
.toggle.active{background:var(--green)}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;background:white;border-radius:50%;transition:transform 0.2s}
.toggle.active::after{transform:translateX(20px)}

/* 选择器行 */
.selector-row{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.selector-row label{font-size:13px;color:var(--gray-600);font-weight:500;white-space:nowrap}
.selector-row select{padding:8px 12px;border:1px solid var(--gray-200);border-radius:8px;font-size:13px;min-width:200px}

/* 加载 */
.loading{text-align:center;padding:40px;color:var(--gray-400)}
.spinner{width:24px;height:24px;border:3px solid var(--gray-200);border-top-color:var(--blue);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}

/* 隐藏视图 */
.view{display:none}
.view.active{display:block}

/* toast */
.toast{position:fixed;top:20px;right:20px;padding:12px 20px;border-radius:8px;color:white;font-size:13px;z-index:9999;opacity:0;transition:opacity 0.3s}
.toast.show{opacity:1}
.toast-success{background:var(--green)}
.toast-error{background:var(--red)}

@media(max-width:768px){
  .sidebar{display:none}
  .main{margin-left:0;width:100%}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
}
/* PLACEHOLDER_STYLES */
</style>
</head>
<body>
<!-- 登录页 -->
<div class="login-page" id="loginPage">
  <div class="login-card">
    <div class="login-logo">声纳<span>CRM</span></div>
    <div class="login-sub">平台管理后台</div>
    <div class="form-group">
      <label>用户名</label>
      <input type="text" id="loginUsername" placeholder="请输入用户名">
    </div>
    <div class="form-group">
      <label>密码</label>
      <input type="password" id="loginPassword" placeholder="请输入密码" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn btn-primary btn-full" onclick="doLogin()">登录</button>
  </div>
</div>

<!-- 管理后台 -->
<div class="app" id="app">
  <div class="topbar">
    <div class="topbar-logo">声纳<span>CRM</span> · 平台管理</div>
    <div class="topbar-user">
      <div style="color:rgba(255,255,255,0.3);font-size:10px;margin-right:8px;">v2.0.1</div>
      <div class="avatar" id="userAvatar">管</div>
      <div>
        <div class="name" id="userName">管理员</div>
        <div class="role" onclick="logout()">退出登录</div>
      </div>
    </div>
  </div>

  <nav class="sidebar">
    <div class="nav-group">
      <div class="nav-group-label">概览</div>
      <a class="nav-link active" onclick="showView('dashboard',this)">📊 数据概览</a>
    </div>
    <div class="nav-group">
      <div class="nav-group-label">管理</div>
      <a class="nav-link" onclick="showView('tenants',this)">🏢 租户管理</a>
      <a class="nav-link" onclick="showView('prompts',this)">📝 提示词管理</a>
      <a class="nav-link" onclick="showView('models',this)">🤖 模型配置</a>
    </div>
  </nav>

  <main class="main" id="mainContent">
    <!-- 数据概览 -->
    <div class="view active" id="view-dashboard">
      <div class="page-header"><div><div class="page-title">数据概览</div><div class="page-sub">平台运营数据</div></div></div>
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-label">租户总数</div><div class="stat-val" id="statTotal">-</div><div class="stat-icon">🏢</div></div>
        <div class="stat-card"><div class="stat-label">活跃租户</div><div class="stat-val" id="statActive">-</div><div class="stat-icon">✅</div></div>
        <div class="stat-card"><div class="stat-label">即将到期</div><div class="stat-val" id="statExpiring">-</div><div class="stat-sub">7天内到期</div><div class="stat-icon">⏰</div></div>
        <div class="stat-card"><div class="stat-label">用户总数</div><div class="stat-val" id="statUsers">-</div><div class="stat-icon">👥</div></div>
      </div>
    </div>

    <!-- 租户管理 -->
    <div class="view" id="view-tenants">
      <div class="page-header">
        <div><div class="page-title">租户管理</div><div class="page-sub">管理平台所有租户</div></div>
        <button class="btn btn-primary btn-sm" onclick="openCreateTenant()">+ 新增租户</button>
      </div>
      <div class="table-card">
        <table>
          <thead><tr><th>租户名称</th><th>登录账号</th><th>邀请链接</th><th>到期时间</th><th>用户数</th><th>状态</th><th>操作</th></tr></thead>
          <tbody id="tenantTableBody"><tr><td colspan="7" class="loading">加载中...</td></tr></tbody>
        </table>
      </div>
    </div>

    <!-- 提示词管理 -->
    <div class="view" id="view-prompts">
      <div class="page-header"><div><div class="page-title">提示词管理</div><div class="page-sub">按租户管理 AI 提示词</div></div></div>
      <div class="selector-row">
        <label>选择租户：</label>
        <select id="promptTenantSelect" onchange="loadPromptConfigs()"><option value="">-- 请选择 --</option></select>
      </div>
      <div class="config-grid" id="promptCards"></div>
    </div>

    <!-- 模型配置 -->
    <div class="view" id="view-models">
      <div class="page-header"><div><div class="page-title">模型配置</div><div class="page-sub">AI 模型参数与测试</div></div></div>
      <div class="selector-row">
        <label>选择租户：</label>
        <select id="modelTenantSelect" onchange="loadModelConfigs()"><option value="">-- 请选择 --</option></select>
      </div>
      <div class="config-grid" id="modelCards"></div>
      <div class="test-panel">
        <h3>模型测试</h3>
        <div class="selector-row">
          <label>选择配置：</label>
          <select id="testConfigSelect"><option value="">-- 请先选择租户 --</option></select>
        </div>
        <div class="form-group" style="margin-bottom:12px">
          <textarea id="testMessage" rows="3" placeholder="输入测试消息..."></textarea>
        </div>
        <button class="btn btn-primary btn-sm" onclick="sendTest()" id="testBtn">发送测试</button>
        <div class="test-output" id="testOutput">测试结果将显示在这里</div>
      </div>
    </div>

    <!-- PLACEHOLDER_VIEWS -->
  </main>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- 新增租户弹窗 -->
<div class="modal" id="createTenantModal">
  <div class="modal-content">
    <div class="modal-header"><div class="modal-title">新增租户</div><span class="modal-close" onclick="closeModal('createTenantModal')">&times;</span></div>
    <div class="form-group"><label>租户名称</label><input id="ctName" placeholder="如：某某装饰公司"></div>
    <div class="form-group"><label>租户标识 (slug)</label><input id="ctSlug" placeholder="英文标识，如 company-a"></div>
    <div class="form-group"><label>登录账号</label><input id="ctUsername" placeholder="管理员登录用户名"></div>
    <div class="form-group"><label>登录密码</label><input id="ctPassword" type="password" placeholder="至少6位"></div>
    <div class="form-group"><label>到期时间</label><input id="ctExpires" type="date"></div>
    <div class="form-group"><label>绑定IP（逗号分隔，留空不限制）</label><input id="ctIps" placeholder="如 1.2.3.4,5.6.7.8"></div>
    <div class="form-group"><label>邀请链接有效期（留空永不过期）</label><input id="ctInviteExpires" type="date"></div>
    <div class="form-group"><label>老板账号数量</label><input id="ctBossCount" type="number" value="0" min="0" placeholder="自动生成 boss1, boss2..."></div>
    <div class="form-group"><label>客服账号数量</label><input id="ctAgentCount" type="number" value="0" min="0" placeholder="自动生成 agent1, agent2..."></div>
    <div class="form-group"><label>最大用户数</label><input id="ctMaxUsers" type="number" value="10"></div>
    <div class="modal-footer"><button class="btn btn-outline" onclick="closeModal('createTenantModal')">取消</button><button class="btn btn-primary" onclick="createTenant()">创建</button></div>
  </div>
</div>

<!-- 编辑租户弹窗 -->
<div class="modal" id="editTenantModal">
  <div class="modal-content">
    <div class="modal-header"><div class="modal-title">编辑租户</div><span class="modal-close" onclick="closeModal('editTenantModal')">&times;</span></div>
    <input type="hidden" id="etId">
    <div class="form-group"><label>租户名称</label><input id="etName"></div>
    <div class="form-group"><label>到期时间</label><input id="etExpires" type="date"></div>
    <div class="form-group"><label>绑定IP</label><input id="etIps" placeholder="逗号分隔"></div>
    <div class="form-group"><label>最大用户数</label><input id="etMaxUsers" type="number"></div>
    <div class="modal-footer"><button class="btn btn-outline" onclick="closeModal('editTenantModal')">取消</button><button class="btn btn-primary" onclick="saveTenant()">保存</button></div>
  </div>
</div>

<!-- 重置密码弹窗 -->
<div class="modal" id="resetPwdModal">
  <div class="modal-content">
    <div class="modal-header"><div class="modal-title">重置管理员密码</div><span class="modal-close" onclick="closeModal('resetPwdModal')">&times;</span></div>
    <input type="hidden" id="rpId">
    <div class="form-group"><label>新密码</label><input id="rpPassword" type="password" placeholder="至少6位"></div>
    <div class="modal-footer"><button class="btn btn-outline" onclick="closeModal('resetPwdModal')">取消</button><button class="btn btn-primary" onclick="resetPassword()">确认重置</button></div>
  </div>
</div>

<!-- 编辑提示词弹窗 -->
<div class="modal" id="editPromptModal">
  <div class="modal-content" style="max-width:800px">
    <div class="modal-header"><div class="modal-title" id="epTitle">编辑提示词</div><span class="modal-close" onclick="closeModal('editPromptModal')">&times;</span></div>
    <input type="hidden" id="epId">
    <div class="form-group"><label>系统提示词 (systemPrompt)</label><textarea id="epPrompt" rows="18" style="font-size:13px;line-height:1.6"></textarea></div>
    <div class="modal-footer"><button class="btn btn-outline" onclick="closeModal('editPromptModal')">取消</button><button class="btn btn-primary" onclick="savePrompt()">保存</button></div>
  </div>
</div>

<!-- 编辑模型配置弹窗 -->
<div class="modal" id="editModelModal">
  <div class="modal-content">
    <div class="modal-header"><div class="modal-title">编辑模型配置</div><span class="modal-close" onclick="closeModal('editModelModal')">&times;</span></div>
    <input type="hidden" id="emId">
    <div class="form-group"><label>模型</label><input id="emModel"></div>
    <div class="form-group"><label>API URL</label><input id="emApiUrl"></div>
    <div class="form-group"><label>API Key（留空不修改）</label><input id="emApiKey" placeholder="留空保持不变"></div>
    <div class="modal-footer"><button class="btn btn-outline" onclick="closeModal('editModelModal')">取消</button><button class="btn btn-primary" onclick="saveModel()">保存</button></div>
  </div>
</div>

<!-- PLACEHOLDER_MODALS -->

<script>
const API = '/api';
let token = localStorage.getItem('admin_token');
let currentUser = null;
let tenantsCache = [];
let currentModelConfigs = [];

// =====================================================
// 工具函数
// =====================================================
function $(id) { return document.getElementById(id); }

async function api(path, opts = {}) {
  const headers = { 'Content-Type': 'application/json' };
  if (token) headers['Authorization'] = 'Bearer ' + token;
  const res = await fetch(API + path, { ...opts, headers });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || '请求失败');
  return data;
}

function toast(msg, type = 'success') {
  const t = $('toast');
  t.textContent = msg;
  t.className = 'toast toast-' + type + ' show';
  setTimeout(() => t.className = 'toast', 3000);
}

function openModal(id) { $(id).classList.add('active'); }
function closeModal(id) { $(id).classList.remove('active'); }

function fmtDate(d) {
  if (!d) return '-';
  return new Date(d).toLocaleDateString('zh-CN');
}

// =====================================================
// 登录/登出
// =====================================================
async function doLogin() {
  const username = $('loginUsername').value.trim();
  const password = $('loginPassword').value;
  if (!username || !password) return toast('请输入用户名和密码', 'error');
  try {
    const res = await api('/auth/login', { method: 'POST', body: JSON.stringify({ username, password }) });
    token = res.data.token;
    currentUser = res.data.user;
    localStorage.setItem('admin_token', token);
    $('loginPage').style.display = 'none';
    $('app').classList.add('active');
    $('userName').textContent = currentUser.name;
    $('userAvatar').textContent = currentUser.name[0];
    loadDashboard();
  } catch (e) {
    toast(e.message, 'error');
  }
}

function logout() {
  token = null;
  currentUser = null;
  localStorage.removeItem('admin_token');
  location.reload();
}

// =====================================================
// 视图切换
// =====================================================
function showView(name, el) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
  $('view-' + name).classList.add('active');
  if (el) el.classList.add('active');

  if (name === 'dashboard') loadDashboard();
  else if (name === 'tenants') loadTenants();
  else if (name === 'prompts') { populateTenantSelect('promptTenantSelect'); }
  else if (name === 'models') { populateTenantSelect('modelTenantSelect'); }
}

// =====================================================
// 数据概览
// =====================================================
async function loadDashboard() {
  try {
    const res = await api('/tenants/stats');
    const d = res.data;
    $('statTotal').textContent = d.total;
    $('statActive').textContent = d.active;
    $('statExpiring').textContent = d.expiringSoon;
    $('statUsers').textContent = d.totalUsers;
  } catch (e) {
    toast('加载统计失败: ' + e.message, 'error');
  }
}

// =====================================================
// 租户管理
// =====================================================
async function loadTenants() {
  try {
    const res = await api('/tenants');
    tenantsCache = res.data;
    renderTenants(tenantsCache);
  } catch (e) {
    toast('加载租户失败: ' + e.message, 'error');
  }
}

function renderTenants(list) {
  const tbody = $('tenantTableBody');
  if (!list.length) { tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:40px;color:var(--gray-400)">暂无租户</td></tr>'; return; }
  tbody.innerHTML = list.map(t => {
    const statusBadge = t.status === 'active' ? '<span class="badge badge-active">启用</span>' : '<span class="badge badge-disabled">禁用</span>';
    const isDefault = t.slug === 'default';
    const inviteAgent = t.inviteCodeAgent ? `${location.origin}/agent?invite=${t.inviteCodeAgent}` : '';
    const inviteBoss = t.inviteCodeBoss ? `${location.origin}/agent?invite=${t.inviteCodeBoss}` : '';
    const inviteExpired = t.inviteExpiresAt && new Date(t.inviteExpiresAt) < new Date();
    return `<tr>
      <td><strong>${t.name}</strong><br><span style="font-size:11px;color:var(--gray-400)">${t.slug}</span></td>
      <td>${t.adminUser || '-'}</td>
      <td style="font-size:11px">${inviteExpired ? '<span style="color:var(--red)">已过期</span>' : t.inviteCodeAgent ? `
        <span style="cursor:pointer;color:var(--blue)" onclick="copyInvite('${inviteAgent}')">客服: ${t.inviteCodeAgent} 📋</span><br>
        <span style="cursor:pointer;color:var(--purple)" onclick="copyInvite('${inviteBoss}')">老板: ${t.inviteCodeBoss} 📋</span>
        ${t.inviteExpiresAt ? '<br><span style="color:var(--gray-400)">'+fmtDate(t.inviteExpiresAt)+'到期</span>' : ''}
      ` : '-'}</td>
      <td>${fmtDate(t.expiresAt)}</td>
      <td>${t.userCount}/${t.maxUsers}</td>
      <td>${statusBadge}</td>
      <td>
        ${isDefault ? '<span style="font-size:11px;color:var(--gray-400)">平台租户</span>' : `
        <button class="btn btn-outline btn-xs" onclick="openEditTenant('${t.id}')">编辑</button>
        <button class="btn btn-xs ${t.status==='active'?'btn-amber':'btn-green'}" onclick="toggleTenant('${t.id}')">${t.status==='active'?'禁用':'启用'}</button>
        <button class="btn btn-outline btn-xs" onclick="openResetPwd('${t.id}')">重置密码</button>
        `}
      </td>
    </tr>`;
  }).join('');
}

function openCreateTenant() { openModal('createTenantModal'); }

function copyInvite(url) {
  navigator.clipboard.writeText(url).then(() => toast('邀请链接已复制')).catch(() => {
    prompt('复制链接：', url);
  });
}

async function createTenant() {
  const data = {
    name: $('ctName').value.trim(),
    slug: $('ctSlug').value.trim(),
    username: $('ctUsername').value.trim(),
    password: $('ctPassword').value,
    expiresAt: $('ctExpires').value || null,
    allowedIps: $('ctIps').value.trim() || null,
    inviteExpiresAt: $('ctInviteExpires').value || null,
    maxUsers: parseInt($('ctMaxUsers').value) || 10,
    bossCount: parseInt($('ctBossCount').value) || 0,
    agentCount: parseInt($('ctAgentCount').value) || 0
  };
  if (!data.name || !data.slug || !data.username || !data.password) return toast('请填写必填项', 'error');
  const btn = event.target; btn.disabled = true; btn.textContent = '创建中...';
  try {
    await api('/tenants', { method: 'POST', body: JSON.stringify(data) });
    toast('租户创建成功');
    closeModal('createTenantModal');
    ['ctName','ctSlug','ctUsername','ctPassword','ctExpires','ctIps','ctInviteExpires'].forEach(id => $(id).value = '');
    $('ctMaxUsers').value = '10'; $('ctBossCount').value = '0'; $('ctAgentCount').value = '0';
    loadTenants();
  } catch (e) { toast(e.message, 'error'); }
  finally { btn.disabled = false; btn.textContent = '创建'; }
}

function openEditTenant(id) {
  const t = tenantsCache.find(x => x.id === id);
  if (!t) return;
  $('etId').value = id;
  $('etName').value = t.name;
  $('etExpires').value = t.expiresAt ? t.expiresAt.slice(0, 10) : '';
  $('etIps').value = t.allowedIps || '';
  $('etMaxUsers').value = t.maxUsers;
  openModal('editTenantModal');
}

async function saveTenant() {
  const id = $('etId').value;
  const data = {
    name: $('etName').value.trim(),
    expiresAt: $('etExpires').value || null,
    allowedIps: $('etIps').value.trim() || null,
    maxUsers: parseInt($('etMaxUsers').value) || 10
  };
  const btn = event.target; btn.disabled = true; btn.textContent = '保存中...';
  try {
    await api('/tenants/' + id, { method: 'PUT', body: JSON.stringify(data) });
    toast('更新成功');
    closeModal('editTenantModal');
    loadTenants();
  } catch (e) { toast(e.message, 'error'); }
  finally { btn.disabled = false; btn.textContent = '保存'; }
}

async function toggleTenant(id) {
  try {
    const res = await api('/tenants/' + id + '/toggle', { method: 'PUT' });
    toast(res.message);
    loadTenants();
  } catch (e) { toast(e.message, 'error'); }
}

function openResetPwd(id) {
  $('rpId').value = id;
  $('rpPassword').value = '';
  openModal('resetPwdModal');
}

async function resetPassword() {
  const id = $('rpId').value;
  const password = $('rpPassword').value;
  if (!password || password.length < 6) return toast('密码至少6位', 'error');
  try {
    await api('/tenants/' + id + '/reset-password', { method: 'POST', body: JSON.stringify({ password }) });
    toast('密码已重置');
    closeModal('resetPwdModal');
  } catch (e) { toast(e.message, 'error'); }
}

// =====================================================
// 租户下拉填充
// =====================================================
async function populateTenantSelect(selectId) {
  if (!tenantsCache.length) {
    try { const res = await api('/tenants'); tenantsCache = res.data; } catch(e) { return; }
  }
  const sel = $(selectId);
  const val = sel.value;
  sel.innerHTML = '<option value="">-- 请选择 --</option>' + tenantsCache.map(t => `<option value="${t.id}">${t.name} (${t.slug})</option>`).join('');
  if (val) sel.value = val;
}

// =====================================================
// 提示词管理
// =====================================================
async function loadPromptConfigs() {
  const tenantId = $('promptTenantSelect').value;
  const container = $('promptCards');
  if (!tenantId) { container.innerHTML = ''; return; }

  try {
    // 临时切换 tenantId 来获取该租户的配置
    const res = await api('/config/ai?tenantId=' + tenantId);
    const configs = res.data;
    container.innerHTML = configs.map(c => `
      <div class="config-card">
        <div class="config-card-title">${c.name}</div>
        <div class="config-card-desc">${c.description || ''}</div>
        <div class="prompt-preview">${c.systemPrompt ? c.systemPrompt.slice(0, 200) + (c.systemPrompt.length > 200 ? '...' : '') : '（未设置提示词）'}</div>
        <div style="margin-top:12px"><button class="btn btn-outline btn-xs" onclick="openEditPrompt('${c.id}','${c.name}')">编辑提示词</button></div>
      </div>
    `).join('');
  } catch (e) { toast('加载配置失败: ' + e.message, 'error'); }
}

function openEditPrompt(id, name) {
  $('epId').value = id;
  $('epTitle').textContent = '编辑提示词 - ' + name;
  // 从缓存中找到完整 prompt
  $('epPrompt').value = '加载中...';
  openModal('editPromptModal');
  // 获取完整配置
  api('/config/ai').then(res => {
    const c = res.data.find(x => x.id === id);
    $('epPrompt').value = c?.systemPrompt || '';
  }).catch(() => {});
}

async function savePrompt() {
  const id = $('epId').value;
  const systemPrompt = $('epPrompt').value;
  try {
    await api('/config/ai/' + id, { method: 'PUT', body: JSON.stringify({ systemPrompt }) });
    toast('提示词已保存');
    closeModal('editPromptModal');
    loadPromptConfigs();
  } catch (e) { toast(e.message, 'error'); }
}

// =====================================================
// 模型配置
// =====================================================
async function loadModelConfigs() {
  const tenantId = $('modelTenantSelect').value;
  const container = $('modelCards');
  const testSel = $('testConfigSelect');
  if (!tenantId) { container.innerHTML = ''; testSel.innerHTML = '<option value="">-- 请先选择租户 --</option>'; return; }

  try {
    const res = await api('/config/ai?tenantId=' + tenantId);
    currentModelConfigs = res.data;
    container.innerHTML = currentModelConfigs.map(c => `
      <div class="config-card">
        <div class="config-card-title">${c.name} <span class="toggle ${c.isActive?'active':''}" onclick="toggleModelActive('${c.id}',${!c.isActive})"></span></div>
        <div class="config-card-desc">${c.description || ''}</div>
        <div class="config-row"><span class="config-label">Provider</span><span class="config-value">${c.provider}</span></div>
        <div class="config-row"><span class="config-label">Model</span><span class="config-value">${c.model}</span></div>
        <div class="config-row"><span class="config-label">API URL</span><span class="config-value">${c.apiUrl || '-'}</span></div>
        <div class="config-row"><span class="config-label">API Key</span><span class="config-value">${c.apiKey || '-'}</span></div>
        <div style="margin-top:12px"><button class="btn btn-outline btn-xs" onclick="openEditModel('${c.id}')">编辑配置</button></div>
      </div>
    `).join('');

    testSel.innerHTML = '<option value="">-- 选择配置 --</option>' + currentModelConfigs.map(c => `<option value="${c.id}">${c.name} - ${c.model}</option>`).join('');
  } catch (e) { toast('加载配置失败: ' + e.message, 'error'); }
}

async function toggleModelActive(id, active) {
  try {
    await api('/config/ai/' + id, { method: 'PUT', body: JSON.stringify({ isActive: active }) });
    loadModelConfigs();
  } catch (e) { toast(e.message, 'error'); }
}

function openEditModel(id) {
  const c = currentModelConfigs.find(x => x.id === id);
  if (!c) return;
  $('emId').value = id;
  $('emModel').value = c.model;
  $('emApiUrl').value = c.apiUrl || '';
  $('emApiKey').value = '';
  openModal('editModelModal');
}

async function saveModel() {
  const id = $('emId').value;
  const data = { model: $('emModel').value.trim(), apiUrl: $('emApiUrl').value.trim() };
  const key = $('emApiKey').value.trim();
  if (key) data.apiKey = key;
  try {
    await api('/config/ai/' + id, { method: 'PUT', body: JSON.stringify(data) });
    toast('配置已保存');
    closeModal('editModelModal');
    loadModelConfigs();
  } catch (e) { toast(e.message, 'error'); }
}

// =====================================================
// 模型测试
// =====================================================
async function sendTest() {
  const configId = $('testConfigSelect').value;
  const message = $('testMessage').value.trim();
  if (!configId) return toast('请选择配置', 'error');
  if (!message) return toast('请输入测试消息', 'error');

  const btn = $('testBtn');
  const output = $('testOutput');
  btn.disabled = true;
  btn.textContent = '发送中...';
  output.textContent = '等待 AI 响应...';

  try {
    const res = await api('/config/ai/test', { method: 'POST', body: JSON.stringify({ configId, message }) });
    output.textContent = res.data.reply;
  } catch (e) {
    output.textContent = '错误: ' + e.message;
  } finally {
    btn.disabled = false;
    btn.textContent = '发送测试';
  }
}

// =====================================================
// 初始化
// =====================================================
(async function init() {
  if (token) {
    try {
      const res = await api('/auth/me');
      currentUser = res.data;
      $('loginPage').style.display = 'none';
      $('app').classList.add('active');
      $('userName').textContent = currentUser.name;
      $('userAvatar').textContent = currentUser.name[0];
      loadDashboard();
    } catch (e) {
      token = null;
      localStorage.removeItem('admin_token');
    }
  }
})();
